[api]
host = "127.0.0.1"
port = 7171
log_level = "info"

[enforcer]
# interval_seconds is controlled by xhttp-enforcer.timer, not by this value.
# This key is informational only.
interval_seconds = 60
device_window_minutes = 5
device_throttle_minutes = 5
stats_grpc_port = 10085

[xray]
config_path = "/usr/local/etc/xray/config.json"
access_log  = "/var/log/xray/access.log"
reload_cmd = "systemctl restart xray"

[storage]
db_path    = "/var/lib/xhttp-manager/db.sqlite"
backup_dir = "/var/lib/xhttp-manager/backups"
max_backups = 20

[security]
token_file = "/etc/xhttp-manager/admin.token"
